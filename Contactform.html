<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact form</title>
    <link rel="stylesheet" href="./src/output.css">
</head>

<body class="bg-gray-700 text-white min-h-screen  px-4 flex items-center justify-center">
    <form class="bg-black p-8 w-full max-w-lg space-y-6  rounded-lg shadow-md">



        <h1 class=" font-bold text-white text-center text-2xl ">Contact Us</h1>

        <div class="grid grid-cols-1
         md:grid-cols-2 gap-4 ">
            <input type="text" placeholder="First Name" class="border border-yellow-500 rounded-md px-4 py-2  ">
            <input type="text" placeholder="Last Name" class="border border-yellow-500 rounded-md px-4 py-2  ">
        </div>
        <input type="email" placeholder="Your Email" class="border w-full border-yellow-500 rounded-md px-4 py-2  ">


        <textarea rows="5" placeholder="Enter Your Message" class="w-full border border-amber-500 rounded-md px-4 py-3 "></textarea>
        <label class="inline-flex space-x-2 items-center">
            <input type="checkbox" class="form-checkbox text-amber-300 w-5 v-5
            "> 
            <span class="text-amber-300 text-sm tracking-wide leading-3 ">I agree to term and condition </span>
        </label>
        <button type="submit" class="w-full bg-amber-800 text-amber-50 font-semibold px-4 py-3 rounded-md" > Submit </button>
    </form>
</body>

</html>
